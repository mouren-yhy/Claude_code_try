{% extends "base.html" %}

{% block title %}聊天记录 - 微信托管控制台{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>聊天记录 & AI 上下文</h2>
    <select class="form-select" style="width: auto;" id="contactSelect" onchange="loadData()">
        <option value="">选择联系人...</option>
        {% for contact in contacts %}
        <option value="{{ contact.id }}">{{ contact.name }}</option>
        {% endfor %}
    </select>
</div>

<!-- 标签页 -->
<ul class="nav nav-tabs mb-3" id="viewTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="messages-tab" data-bs-toggle="tab" data-bs-target="#messages-view" type="button">
            聊天记录
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="context-tab" data-bs-toggle="tab" data-bs-target="#context-view" type="button">
            AI 对话上下文
        </button>
    </li>
</ul>

<!-- 标签内容 -->
<div class="tab-content">
    <!-- 聊天记录视图 -->
    <div class="tab-pane fade show active" id="messages-view" role="tabpanel">
        <div class="card">
            <div class="card-body">
                <div id="messagesContainer">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-chat-dots fs-1"></i>
                        <p class="mt-3">请选择一个联系人查看聊天记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 上下文视图 -->
    <div class="tab-pane fade" id="context-view" role="tabpanel">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="text-muted">AI 当前记忆的对话上下文</span>
                <span id="contextCount" class="badge bg-primary">0 条消息</span>
            </div>
            <div class="card-body">
                <div id="contextContainer">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-cpu fs-1"></i>
                        <p class="mt-3">请选择一个联系人查看 AI 对话上下文</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentContactId = null;

async function loadData() {
    const select = document.getElementById('contactSelect');
    currentContactId = select.value;

    if (currentContactId) {
        loadMessages();
        loadContext();
    } else {
        resetViews();
    }
}

function resetViews() {
    document.getElementById('messagesContainer').innerHTML = `
        <div class="text-center text-muted py-5">
            <i class="bi bi-chat-dots fs-1"></i>
            <p class="mt-3">请选择一个联系人查看聊天记录</p>
        </div>
    `;
    document.getElementById('contextContainer').innerHTML = `
        <div class="text-center text-muted py-5">
            <i class="bi bi-cpu fs-1"></i>
            <p class="mt-3">请选择一个联系人查看 AI 对话上下文</p>
        </div>
    `;
    document.getElementById('contextCount').textContent = '0 条消息';
}

async function loadMessages() {
    const container = document.getElementById('messagesContainer');

    if (!currentContactId) {
        return;
    }

    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border"></div></div>';

    try {
        const res = await fetch(`/api/contacts/${currentContactId}/messages?limit=100`);
        const result = await res.json();

        if (result.success) {
            const messages = result.data;
            if (messages.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5">暂无消息记录</div>';
                return;
            }

            let html = '<div class="chat-messages">';
            messages.forEach(msg => {
                const isReceived = msg.msg_type === 'received';
                const align = isReceived ? 'justify-content-start' : 'justify-content-end';
                const bgClass = isReceived ? 'bg-light' : 'bg-primary text-white';
                const label = isReceived ? '收到' : '发送';
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '';

                html += `
                    <div class="d-flex ${align} mb-3">
                        <div class="${bgClass} rounded p-3" style="max-width: 70%;">
                            <div class="d-flex justify-content-between mb-1">
                                <small class="opacity-50">${label}</small>
                                <small class="opacity-50 ms-2">${time}</small>
                            </div>
                            <div class="message-content">${escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    } catch (e) {
        container.innerHTML = '<div class="text-center text-danger py-5">加载失败</div>';
    }
}

async function loadContext() {
    const container = document.getElementById('contextContainer');
    const countBadge = document.getElementById('contextCount');

    if (!currentContactId) {
        return;
    }

    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border"></div></div>';

    try {
        const res = await fetch(`/api/contacts/${currentContactId}/context`);
        const result = await res.json();

        if (result.success) {
            const context = result.data.context;
            countBadge.textContent = `${result.data.message_count} 条消息`;

            if (context.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5">AI 还没有记忆任何对话上下文</div>';
                return;
            }

            let html = '<div class="context-messages">';
            context.forEach((msg, index) => {
                const isUser = msg.role === 'user';
                const align = isUser ? 'justify-content-start' : 'justify-content-end';
                const bgClass = isUser ? 'bg-light' : 'bg-success text-white';
                const icon = isUser ? '👤 用户' : '🤖 AI';
                const label = isUser ? '用户消息' : 'AI 回复';

                html += `
                    <div class="d-flex ${align} mb-3">
                        <div class="${bgClass} rounded p-3 context-msg" style="max-width: 80%;">
                            <div class="d-flex align-items-center mb-1">
                                <span class="badge ${isUser ? 'bg-secondary' : 'bg-success opacity-75'} me-2">${icon}</span>
                                <small class="opacity-50">#${index + 1}</small>
                            </div>
                            <div class="message-content">${escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    } catch (e) {
        container.innerHTML = '<div class="text-center text-danger py-5">加载失败</div>';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

<style>
.chat-messages, .context-messages {
    max-height: 600px;
    overflow-y: auto;
    padding: 20px;
    background-color: #f8f9fa;
    border-radius: 10px;
}
.message-content {
    white-space: pre-wrap;
    word-break: break-word;
}
.context-msg {
    border-left: 3px solid rgba(0,0,0,0.1);
}
</style>
{% endblock %}
