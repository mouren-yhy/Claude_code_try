{% extends "base.html" %}

{% block title %}设置 - 微信托管控制台{% endblock %}

{% block content %}
<h2>设置</h2>

<div class="row g-4">
    <!-- Ollama 设置 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="bi bi-cpu"></i> Ollama 设置</h5>
            </div>
            <div class="card-body">
                <form id="ollamaForm">
                    <div class="mb-3">
                        <label class="form-label">API 地址</label>
                        <input type="text" class="form-control" name="ollama_base_url"
                               value="{{ config.ollama.base_url }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模型名称</label>
                        <select class="form-select" name="ollama_model" id="modelSelect">
                            <option value="{{ config.ollama.model }}" selected>{{ config.ollama.model }} (当前)</option>
                        </select>
                        <small class="text-muted">可用模型: {{ models|join(', ') if models else '无法获取' }}</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">超时时间 (秒)</label>
                        <input type="number" class="form-control" name="ollama_timeout"
                               value="{{ config.ollama.timeout }}">
                    </div>
                </form>
                <div class="d-grid">
                    <button class="btn btn-primary" onclick="saveOllamaSettings()">保存设置</button>
                </div>
                <hr>
                <div class="d-grid">
                    <button class="btn btn-outline-success" onclick="testOllama()">
                        <i class="bi bi-check-circle"></i> 测试连接
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 设置 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="bi bi-robot"></i> AI 设置</h5>
            </div>
            <div class="card-body">
                <form id="aiForm">
                    <div class="mb-3">
                        <label class="form-label">最大上下文消息数</label>
                        <input type="number" class="form-control" name="ai_max_context"
                               value="{{ config.ai.max_context_messages }}">
                        <small class="text-muted">保留的最近对话轮数</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">温度 (Temperature)</label>
                        <input type="number" class="form-control" name="ai_temperature" step="0.1" min="0" max="2"
                               value="{{ config.ai.temperature }}">
                        <small class="text-muted">越高越随机，越低越确定</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">默认系统提示词</label>
                        <textarea class="form-control" name="ai_default_prompt" rows="4">{{ config.ai.default_system_prompt }}</textarea>
                    </div>
                </form>
                <div class="d-grid">
                    <button class="btn btn-primary" onclick="saveAISettings()">保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 微信设置 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="bi bi-wechat"></i> 微信设置</h5>
            </div>
            <div class="card-body">
                <form id="wechatForm">
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="autoReply"
                               {% if config.wechat.auto_reply %}checked{% endif %}>
                        <label class="form-check-label" for="autoReply">
                            启用自动回复
                        </label>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="whitelistOnly"
                               {% if config.wechat.whitelist_only %}checked{% endif %}>
                        <label class="form-check-label" for="whitelistOnly">
                            仅回复白名单联系人
                        </label>
                    </div>
                </form>
                <div class="d-grid">
                    <button class="btn btn-primary" onclick="saveWechatSettings()">保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Web 设置 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="bi bi-globe"></i> Web 设置</h5>
            </div>
            <div class="card-body">
                <form id="webForm">
                    <div class="mb-3">
                        <label class="form-label">监听地址</label>
                        <input type="text" class="form-control" name="web_host"
                               value="{{ config.web.host }}" readonly>
                        <small class="text-muted">仅限本地访问</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">端口号</label>
                        <input type="number" class="form-control" name="web_port"
                               value="{{ config.web.port }}">
                    </div>
                </form>
                <div class="d-grid">
                    <button class="btn btn-primary" onclick="saveWebSettings()">保存设置</button>
                </div>
                <p class="text-muted mt-2 small">
                    修改端口后需要重启程序生效
                </p>
            </div>
        </div>
    </div>

    <!-- 测试 AI -->
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="bi bi-chat-left-text"></i> 测试 AI 回复</h5>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <input type="text" class="form-control" id="testMessage" placeholder="输入测试消息...">
                    <button class="btn btn-primary" onclick="testAI()">发送</button>
                </div>
                <div id="testResult" class="mt-3 p-3 bg-light rounded" style="display: none;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function saveOllamaSettings() {
    const data = {
        ollama: {
            base_url: document.querySelector('[name="ollama_base_url"]').value,
            model: document.querySelector('[name="ollama_model"]').value,
            timeout: parseInt(document.querySelector('[name="ollama_timeout"]').value)
        }
    };
    await saveSettings(data);
}

async function saveAISettings() {
    const data = {
        ai: {
            max_context_messages: parseInt(document.querySelector('[name="ai_max_context"]').value),
            temperature: parseFloat(document.querySelector('[name="ai_temperature"]').value),
            default_system_prompt: document.querySelector('[name="ai_default_prompt"]').value
        }
    };
    await saveSettings(data);
}

async function saveWechatSettings() {
    const data = {
        wechat: {
            auto_reply: document.getElementById('autoReply').checked,
            whitelist_only: document.getElementById('whitelistOnly').checked
        }
    };
    await saveSettings(data);
}

async function saveWebSettings() {
    const data = {
        web: {
            host: document.querySelector('[name="web_host"]').value,
            port: parseInt(document.querySelector('[name="web_port"]').value)
        }
    };
    await saveSettings(data);
    alert('设置已保存，修改端口后请重启程序');
}

async function saveSettings(data) {
    try {
        const res = await fetch('/api/settings', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alert('设置已保存');
        } else {
            alert('保存失败: ' + result.error);
        }
    } catch (e) {
        alert('操作失败: ' + e);
    }
}

async function testOllama() {
    try {
        const res = await fetch('/api/ai/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: '你好' })
        });
        const result = await res.json();
        if (result.success) {
            alert('连接成功！\n回复: ' + result.data.reply);
        } else {
            alert('测试失败: ' + result.error);
        }
    } catch (e) {
        alert('操作失败: ' + e);
    }
}

async function testAI() {
    const message = document.getElementById('testMessage').value;
    if (!message) {
        alert('请输入测试消息');
        return;
    }

    const resultDiv = document.getElementById('testResult');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<div class="spinner-border spinner-border-sm"></div> 思考中...';

    try {
        const res = await fetch('/api/ai/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });
        const result = await res.json();
        if (result.success) {
            resultDiv.innerHTML = '<strong>AI 回复:</strong><br>' + escapeHtml(result.data.reply);
        } else {
            resultDiv.innerHTML = '<span class="text-danger">测试失败: ' + result.error + '</span>';
        }
    } catch (e) {
        resultDiv.innerHTML = '<span class="text-danger">操作失败: ' + e + '</span>';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 加载可用模型
async function loadModels() {
    try {
        const res = await fetch('/api/ai/models');
        const result = await res.json();
        if (result.success) {
            const select = document.getElementById('modelSelect');
            select.innerHTML = '<option value="{{ config.ollama.model }}" selected>{{ config.ollama.model }} (当前)</option>';
            result.data.forEach(model => {
                if (model !== '{{ config.ollama.model }}') {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    select.appendChild(option);
                }
            });
        }
    } catch (e) {
        console.error('加载模型列表失败', e);
    }
}

loadModels();
</script>
{% endblock %}
