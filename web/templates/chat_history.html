{% extends "base.html" %}

{% block title %}聊天记录 - 微信托管控制台{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>聊天记录</h2>
    <select class="form-select" style="width: auto;" id="contactSelect" onchange="loadMessages()">
        <option value="">选择联系人...</option>
        {% for contact in contacts %}
        <option value="{{ contact.id }}">{{ contact.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="card">
    <div class="card-body">
        <div id="messagesContainer">
            <div class="text-center text-muted py-5">
                <i class="bi bi-chat-dots fs-1"></i>
                <p class="mt-3">请选择一个联系人查看聊天记录</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentContactId = null;

async function loadMessages() {
    const select = document.getElementById('contactSelect');
    currentContactId = select.value;
    const container = document.getElementById('messagesContainer');

    if (!currentContactId) {
        container.innerHTML = `
            <div class="text-center text-muted py-5">
                <i class="bi bi-chat-dots fs-1"></i>
                <p class="mt-3">请选择一个联系人查看聊天记录</p>
            </div>
        `;
        return;
    }

    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border"></div></div>';

    try {
        const res = await fetch(`/api/contacts/${currentContactId}/messages?limit=100`);
        const result = await res.json();

        if (result.success) {
            const messages = result.data;
            if (messages.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5">暂无消息记录</div>';
                return;
            }

            let html = '<div class="chat-messages">';
            messages.forEach(msg => {
                const isReceived = msg.msg_type === 'received';
                const align = isReceived ? 'justify-content-start' : 'justify-content-end';
                const bgClass = isReceived ? 'bg-light' : 'bg-primary text-white';
                const label = isReceived ? '收到' : '发送';
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '';

                html += `
                    <div class="d-flex ${align} mb-3">
                        <div class="${bgClass} rounded p-3" style="max-width: 70%;">
                            <div class="d-flex justify-content-between mb-1">
                                <small class="opacity-50">${label}</small>
                                <small class="opacity-50 ms-2">${time}</small>
                            </div>
                            <div class="message-content">${escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    } catch (e) {
        container.innerHTML = '<div class="text-center text-danger py-5">加载失败</div>';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

<style>
.chat-messages {
    max-height: 600px;
    overflow-y: auto;
    padding: 20px;
    background-color: #f8f9fa;
    border-radius: 10px;
}
.message-content {
    white-space: pre-wrap;
    word-break: break-word;
}
</style>
{% endblock %}
