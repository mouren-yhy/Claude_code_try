<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}微信托管控制台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1e3a5f 0%, #0d2137 100%);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            margin: 4px 8px;
            border-radius: 8px;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255,255,255,0.15);
        }
        .sidebar .nav-link i {
            margin-right: 10px;
        }
        .main-content {
            padding: 20px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-active {
            background-color: #d4edda;
            color: #155724;
        }
        .status-paused {
            background-color: #fff3cd;
            color: #856404;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .stat-card {
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-md-block sidebar p-3">
                <h4 class="text-white mb-4 ps-3">
                    <i class="bi bi-robot"></i> 微信托管
                </h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}" href="{{ url_for('main.dashboard') }}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.contacts' %}active{% endif %}" href="{{ url_for('main.contacts') }}">
                            <i class="bi bi-people"></i> 联系人
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.chat_history' %}active{% endif %}" href="{{ url_for('main.chat_history') }}">
                            <i class="bi bi-chat-left-text"></i> 聊天记录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.settings_page' %}active{% endif %}" href="{{ url_for('main.settings_page') }}">
                            <i class="bi bi-gear"></i> 设置
                        </a>
                    </li>
                </ul>

                <hr class="border-secondary my-4">

                <div class="px-3">
                    <div class="d-flex align-items-center text-white-50 mb-2">
                        <i class="bi bi-circle-fill me-2" id="status-indicator" style="font-size: 10px;"></i>
                        <span id="status-text">运行中</span>
                    </div>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 更新运行状态
        async function updateStatus() {
            try {
                const res = await fetch('/api/control/status');
                const data = await res.json();
                if (data.success) {
                    const indicator = document.getElementById('status-indicator');
                    const statusText = document.getElementById('status-text');
                    if (data.data.paused) {
                        indicator.style.color = '#ffc107';
                        statusText.textContent = '已暂停';
                    } else {
                        indicator.style.color = '#28a745';
                        statusText.textContent = '运行中';
                    }
                }
            } catch (e) {
                console.error('更新状态失败', e);
            }
        }

        // 页面加载时更新状态，然后每10秒更新一次
        updateStatus();
        setInterval(updateStatus, 10000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
